# ADHDTasker — dashboard (built on the native integration)
# New dashboard → Edit → ⋮ → Raw configuration editor → replace all with this.
#
# IMPORTANT: entity IDs include your family name. Replace FAMILY below with your family's
# slug — lowercase, e.g. the Muir family => sensor.muir_adhdtasker_open_tasks. The exact ids
# are in Developer Tools → States. (Find/replace "FAMILY_adhdtasker" → "<yourslug>_adhdtasker".)
# `perform-action` / `perform_action` is HA 2024.8+ (use call-service / service on older cores).
# For a fielded "add task / ping" composer, see ha/adhdtasker-helpers.yaml.

title: ADHDTasker
views:
  - title: Chores
    path: chores
    icon: mdi:broom
    type: sections
    max_columns: 3
    sections:
      # ── Board: every open chore as a tap-through link, with its steps as ☐/☑ ──
      # Tapping a chore opens it in the web app (scrolled-to + highlighted), where the
      # steps are tickable. Steps shown here are read-only.
      - type: grid
        cards:
          - type: heading
            heading: Family board
            icon: mdi:clipboard-check-multiple-outline
          - type: markdown
            content: |
              {% set ts = state_attr('sensor.FAMILY_adhdtasker_open_tasks', 'tasks') or [] %}{% if ts %}
              {% for t in ts %}- **[{{ t.title }}](https://app.adhdtasker.com/?task={{ t.id }})**{{ ' · ' ~ t.assignee if t.assignee }}{{ ' · ' ~ t.points ~ ' pts' if t.points }}{{ ' · ⏳ approval' if t.status == 'PENDING_APPROVAL' }}{{ ' · ▶ in progress' if t.status == 'IN_PROGRESS' }}
              {% for s in t.steps or [] %}    - {{ '☑' if s.done else '☐' }} {{ s.text }}
              {% endfor %}{% endfor %}{% else %}_Board is clear!_ 🎉{% endif %}
          # Prefer interactive whole-task ticking instead? Swap the markdown card above for:
          #   - type: todo-list
          #     entity: todo.FAMILY_adhdtasker_board
          - type: horizontal-stack
            cards:
              - type: button
                name: Ping family
                icon: mdi:bell-ring
                tap_action:
                  action: perform-action
                  perform_action: adhdtasker.ping
                  data:
                    title: Chores
                    message: Check the board!
              - type: button
                name: Refresh
                icon: mdi:refresh
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.FAMILY_adhdtasker_refresh

      # ── At a glance ───────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: At a glance
            icon: mdi:chart-box-outline
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.FAMILY_adhdtasker_pending_approval
                above: 0
            card:
              type: markdown
              content: |
                ### ⏳ {{ states('sensor.FAMILY_adhdtasker_pending_approval') }} waiting for approval
                [Open the Approvals tab →](https://app.adhdtasker.com/?tab=approvals)
          - type: gauge
            entity: sensor.FAMILY_adhdtasker_open_tasks
            name: Open tasks
            min: 0
            max: 20
            needle: false
            severity:
              green: 0
              yellow: 6
              red: 12
          - type: glance
            show_name: true
            show_state: true
            columns: 3
            entities:
              - entity: sensor.FAMILY_adhdtasker_open_tasks
                name: Open
              - entity: sensor.FAMILY_adhdtasker_pending_approval
                name: To approve
                tap_action:
                  action: url
                  url_path: https://app.adhdtasker.com/?tab=approvals
              - entity: sensor.FAMILY_adhdtasker_last_event
                name: Last event

      # ── Leaderboard + activity ────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Leaderboard
            icon: mdi:trophy-outline
          - type: markdown
            content: |
              {% set lb = state_attr('sensor.FAMILY_adhdtasker_open_tasks', 'leaderboard') or [] %}{% if lb %}| # | Who | Points | Bank |
              | :-- | :-- | --: | --: |
              {% for k in lb %}| {{ loop.index }} | {{ k.name }} | {{ k.lifetime }} | {{ k.balance }} |
              {% endfor %}{% else %}_No profiles yet._{% endif %}
          - type: heading
            heading: Recent activity
            icon: mdi:history
          - type: logbook
            hours_to_show: 48
            entities:
              - todo.FAMILY_adhdtasker_board
              - sensor.FAMILY_adhdtasker_last_event
              - sensor.FAMILY_adhdtasker_open_tasks
              - sensor.FAMILY_adhdtasker_pending_approval
