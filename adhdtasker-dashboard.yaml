# ADHDTasker — dashboard (built on the native integration)
# New dashboard → Edit → ⋮ → Raw configuration editor → replace all with this.
#
# Entity IDs assume a single ADHDTasker family (sensor.adhdtasker_*, todo.adhdtasker_board).
# A second family's entities get a _2 suffix — adjust if needed.
# `perform-action` / `perform_action` is HA 2024.8+ (use call-service / service on older cores).
# For a fielded "add task / ping" composer, see ha/adhdtasker-helpers.yaml.

title: ADHDTasker
views:
  - title: Chores
    path: chores
    icon: mdi:broom
    type: sections
    max_columns: 3
    sections:
      # ── Board ─────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Family board
            icon: mdi:clipboard-check-multiple-outline
          # Type to add a task · tick to complete (awards points) · rename · delete.
          - type: todo-list
            entity: todo.adhdtasker_board
          - type: horizontal-stack
            cards:
              - type: button
                name: Ping family
                icon: mdi:bell-ring
                tap_action:
                  action: perform-action
                  perform_action: adhdtasker.ping
                  data:
                    title: Chores
                    message: Check the board!
              - type: button
                name: Refresh
                icon: mdi:refresh
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.adhdtasker_refresh

      # ── At a glance ───────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: At a glance
            icon: mdi:chart-box-outline
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.adhdtasker_pending_approval
                above: 0
            card:
              type: markdown
              content: |
                ### ⏳ {{ states('sensor.adhdtasker_pending_approval') }} waiting for approval
                Tick them off on the board to approve and award the points.
          - type: gauge
            entity: sensor.adhdtasker_open_tasks
            name: Open tasks
            min: 0
            max: 20
            needle: false
            severity:
              green: 0
              yellow: 6
              red: 12
          - type: glance
            show_name: true
            show_state: true
            columns: 3
            entities:
              - entity: sensor.adhdtasker_open_tasks
                name: Open
              - entity: sensor.adhdtasker_pending_approval
                name: To approve
              - entity: sensor.adhdtasker_last_event
                name: Last event

      # ── Leaderboard + activity ────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Leaderboard
            icon: mdi:trophy-outline
          - type: markdown
            content: |
              {% set lb = state_attr('sensor.adhdtasker_open_tasks', 'leaderboard') or [] %}{% if lb %}| # | Who | Points | Bank |
              | :-- | :-- | --: | --: |
              {% for k in lb %}| {{ loop.index }} | {{ k.name }} | {{ k.lifetime }} | {{ k.balance }} |
              {% endfor %}{% else %}_No profiles yet._{% endif %}
          - type: heading
            heading: Recent activity
            icon: mdi:history
          - type: logbook
            hours_to_show: 48
            entities:
              - todo.adhdtasker_board
              - sensor.adhdtasker_last_event
              - sensor.adhdtasker_open_tasks
              - sensor.adhdtasker_pending_approval
