      required: false
      selector:
        text:
    profile:
      name: Profile
      description: Who gets the points (blank = whoever claimed it).
      required: false
      selector:
        text:

ping:
  name: Ping family
  description: Send a push notification to the whole family or one profile.
  fields:
    config_entry_id:
      name: Family
      required: false
      selector:
        config_entry:
          integration: adhdtasker
    title:
      name: Title
      required: false
      example: School morning
      selector:
        text:
    message:
      name: Message
      required: false
      example: Time to get ready!
      selector:
        text:
    profile:
      name: Profile
      description: Target one profile by name (blank = whole family).
      required: false
      selector:
        text:
